<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Online Ping Pong</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        #game-area { display: none; }
        #lobby { padding: 20px; }
        .section { margin: 20px auto; padding: 20px; border: 1px solid #444; width: 300px; }
        input, select, button { padding: 10px; margin: 5px; width: 200px; }
        #join-input-area { display: none; } /* 初期は非表示 */
    </style>
</head>
<body>
    <div id="lobby">
        <h1>Ping Pong Game</h1>
        <input type="text" id="username" placeholder="ユーザー名" required>

        <div class="section">
            <h3>AI対戦</h3>
            <select id="ai-points"><option value="5">5本先取</option><option value="10">10本先取</option><option value="20">20本先取</option></select>
            <select id="ai-balls"><option value="1">ボール 1個</option><option value="2">ボール 2個</option></select>
            <button onclick="startAI()">AI対戦開始</button>
        </div>

        <div class="section">
            <h3>オンライン対戦</h3>
            <select id="room-points"><option value="5">5本先取</option><option value="10">10本先取</option><option value="20">20本先取</option></select>
            <select id="room-balls"><option value="1">ボール 1個</option><option value="2">ボール 2個</option></select>
            <button onclick="createRoom()">部屋を作る</button>
            <button onclick="showJoinInput()">参加する</button>
            
            <div id="join-input-area">
                <input type="text" id="roomCode" placeholder="部屋コードを入力">
                <button onclick="joinRoom()">この部屋に入る</button>
            </div>
        </div>
    </div>

    <div id="game-area">
        <canvas id="pongCanvas" width="600" height="400" style="border:2px solid #fff;"></canvas>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
